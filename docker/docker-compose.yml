services:
  scheduler:
    build:
      context: ..
      dockerfile: Dockerfile
    image: remittance-service
    environment:
      SPRING_PROFILES_ACTIVE: scheduler

  db:
    image: postgres:16-alpine
    container_name: postgres_db
    environment:
      POSTGRES_DB: remittance
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d remittance" ]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:10-alpine
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../src/main/resources/db/migration:/flyway/sql
    command: >
      -url=jdbc:postgresql://db:5432/remittance
      -user=user
      -password=password
      migrate

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    image: remittance-service
    environment:
      SPRING_PROFILES_ACTIVE: api
    ports:
      - "8080:8080"

