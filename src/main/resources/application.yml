spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
  application:
    name: remittance-service
    server:
      port: ${PORT:8080}
  datasource:
    url: jdbc:postgresql://localhost:5432/remittance
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
client:
  apis:
    exchange-api:
      url: ${EXCHANGE_API_URL:https://olinda.bcb.gov.br/olinda/servico/PTAX/versao/v1/odata/CotacaoDolarDia(dataCotacao=@dataCotacao)?@dataCotacao=%2701-30-2025%27&$top=100&$format=json}

security:
  jwt:
    secret: ${JWT_SECRET:lbySAWz8h15bFCj01X8ZxbSjvpxhXqNDCHKUKJanLtO}
    expiration: ${JWT_EXPIRATION:3600000}

resilience4j:
  circuitbreaker:
    instances:
      exchangeRateApi:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 20s
        permittedNumberOfCallsInHalfOpenState: 3
        slowCallDurationThreshold: 2s
        slowCallRateThreshold: 50